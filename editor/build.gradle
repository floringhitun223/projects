buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:4.1.0'  // Use the correct version for your project
    }
}

apply plugin: 'com.android.application'

android {
    compileSdkVersion 33
    defaultConfig {
        applicationId "com.fgg.health"
        minSdkVersion 21
        targetSdkVersion 33
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation 'com.android.support:appcompat-v7:28.0.0'  // Add any other dependencies you need
}
